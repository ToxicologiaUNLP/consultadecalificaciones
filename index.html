<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Asistencia y Calificaciones - Toxicología UNLP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="icon" href="logo1.png" type="image/png" />

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #087882 0%, #0c8c9c 40%, #045c63 70%, #04545d 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

main {
  max-width: 600px;
  width: 100%;
  background: #f9f8f5;
  margin: 30px auto 2em auto;
  padding: 2em;
  border-radius: 16px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  flex: 1;
}

main header { text-align: center; margin-bottom: 25px; }
main header img { width: 100%; height: auto; border-radius: 16px; box-shadow: 0 3px 8px rgba(0,0,0,0.18); }

.titulo-centro {
  font-family: 'Open Sans', sans-serif;
  font-weight: 700;
  font-size: 2em;
  color: #38828f;
  margin: 20px 0 0 0;
}

label { font-weight: 600; margin-top: 1em; margin-bottom: 0.6em; display: block; }
input { width: 100%; padding: 0.7em; font-size: 1.05em; border: 2px solid #ccc; border-radius: 8px; }

button { border-radius: 6px; font-weight: 700; cursor: pointer; margin: 1em auto 0 auto; display: block; border: none; transition: opacity 0.2s; }
#btnConsultar, #btnVolver { background: #2d8390; color: white; }
#btnConsultar { padding: 0.6em 1.5em; font-size: 1.1em; }
#btnVolver { padding: 0.45em 0.9em; font-size: 0.85em; }

.btn-pdf {
    background: #1a3a40;
    color: #fff;
    padding: 10px 15px;
    font-size: 0.8em;
    border-radius: 8px;
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: auto;
    min-width: 200px;
    border: 1px solid rgba(255,255,255,0.1);
}
.btn-pdf:hover { background: #246d77; }

.badge-condicion {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.55em;
  padding: 4px 12px;
  border-radius: 20px;
  margin-left: 8px;
  vertical-align: middle;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 800;
  display: inline-block;
}
.badge-promocion { background-color: #38828f; color: white; }
.badge-regular { background-color: #4caf50; color: white; }
.badge-irregular { 
  background-color: #d32f2f; 
  color: white; 
  animation: parpadeo-alerta 1.5s infinite; 
}
.badge-pendiente { background-color: #9e9e9e; color: white; }

@keyframes parpadeo-alerta { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

.categoria-bloque {
  margin-bottom: 15px; background: #fff; border-radius: 10px; padding: 15px; border: 1px solid #e0e6e7; border-left: 5px solid #38828f;
}
.categoria-titulo { font-family: 'Montserrat', sans-serif; font-size: 0.85em; color: #38828f; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; }
.grid-datos { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
.dato-item { background: #f4f8f9; border: 1px solid #d1dfe1; padding: 10px 4px; border-radius: 6px; text-align: center; }
.dato-label { display: block; font-size: 0.65em; color: #668a90; font-weight: 700; }
.dato-valor { display: block; font-size: 1.1em; font-weight: 800; color: #2c565d; }

.aclaracion-chiquita { font-size: 0.65em; color: #999; margin-top: 8px; font-style: italic; }

.promocion { background-color: #e8f5e9 !important; border-color: #a5d6a7 !important; }
.promocion .dato-valor { color: #2e7d32 !important; }
.desaprobado { background-color: #ffebee !important; border-color: #ef9a9a !important; }
.desaprobado .dato-valor { color: #c62828 !important; }

.sello-contenedor { display: flex; flex-direction: column; align-items: center; margin: 30px 0 10px 0; }
.sello-verificado {
  position: relative; padding: 10px 25px; background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(5px); border-radius: 4px; border: 1px solid #cddde0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05), inset 0 0 15px rgba(255,255,255,0.5);
  overflow: hidden; text-align: center;
  width: 100%; max-width: 300px;
}
.sello-verificado::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 0%, rgba(255, 255, 255, 0) 45%, rgba(255, 255, 255, 0.8) 50%, rgba(255, 255, 255, 0) 55%, transparent 100%);
  transform: rotate(25deg); animation: brilloHolografico 4s infinite;
}
.sello-texto { font-family: 'Montserrat', sans-serif; font-size: 0.8em; font-weight: 700; color: #557b81; letter-spacing: 1.5px; text-transform: uppercase; position: relative; z-index: 1; }
@keyframes brilloHolografico { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }

.seccion-referencias { margin-top: 20px; padding: 12px; background: #eee; border-radius: 8px; font-size: 0.75em; color: #666; line-height: 1.4; }
.info-institucional { margin-top: 1.5em; text-align: center; font-family: "Courier New", Courier, "Lucida Console", Monaco, monospace; font-size: 0.74em; line-height: 1.3; color: #888; }
.link-condiciones { color: #38828f; text-decoration: underline; font-weight: 600; }

footer { color: #ffffff; text-align: center; padding: 1em; font-size: 0.85em; margin-top: auto; }

#loader { display: none; text-align: center; padding: 2em 0; }
.spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #38828f; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (max-width: 600px) { main { width: 100%; margin: 0; border-radius: 0; } }
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

</head>

<body>
<main>
  <header>
    <img src="logop.png" alt="Logo Cátedra" id="imgLogo" crossorigin="anonymous" />
    <div class="titulo-centro">ASISTENCIA Y CALIFICACIONES</div>
  </header>
  <div id="contenido"></div>
  <div id="loader">
    <div class="spinner"></div>
    <div id="loaderText" style="font-family: 'Montserrat'; color: #38828f;">Consultando base de datos...</div>
  </div>
  <canvas id="barcode" style="display:none;"></canvas>
</main>

<footer>© 2026 Cátedra de Toxicología, FCM - UNLP.</footer>

<script>
// URL camuflada en Base64 para evitar identificación directa
const _0x4f22 = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvZS8yUEFDWC0xdVR6dWFOcUFaRzBHMk15OUw2SDNHczV0dUNuSjloMXQ3SDNrRWR6aWV5Z19qcnRjOGoyYjV2dG4wMElIUXYwdDJkSnhCcm40UkpKWEkvcHViP291dHB1dD1jc3Y=";

async function cargarDatos() {
  const u = atob(_0x4f22); 
  const res = await fetch(u + '&_ts=' + Date.now(), { cache: "no-store" });
  const text = await res.text();
  return Papa.parse(text, { header: true, skipEmptyLines: true, delimiter: "," });
}

async function verificarEstado() {
  const datos = await cargarDatos(); // Llamada simplificada
  const filaEstado = datos.data.find(row => row.Estado && row.Estado.trim() !== "");
  const estado = filaEstado?.Estado?.trim().toLowerCase();
  const contenido = document.getElementById('contenido');

  if (estado === 'habilitado') {
    contenido.innerHTML = `
      <div id="formBuscador">
        <p style="color:black; margin:0.5em 0;">Ingrese sus datos de la forma solicitada y el sistema le brindará la información.</p>
        <label for="legajo">Legajo</label><input type="text" id="legajo" placeholder="12345/6" />
        <label for="email">e-mail asociado al SIU Guaraní*</label><input type="email" id="email" placeholder="alumno@gmail.com" />
        <small style="color:#555; font-size:0.9em;">*Correo electrónico elegido para recibir información desde las cátedras.</small>
        <button id="btnConsultar">Acceder</button>
      </div>
      <div id="resultado"></div>
      <div id="error" style="color:red; text-align:center; margin-top:10px;"></div>`;
    document.getElementById('btnConsultar').onclick = buscarNota;
  } else {
    contenido.innerHTML = `<div style="text-align:center; margin:2em; font-weight:bold;">En este momento no es posible acceder.</div>`;
  }
}

async function buscarNota(){
  const legajo = document.getElementById('legajo').value.trim().toLowerCase();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const resDiv = document.getElementById('resultado');
  const errorDiv = document.getElementById('error');
  const formBuscador = document.getElementById('formBuscador');
  const loader = document.getElementById('loader');

  errorDiv.textContent = "";
  if(!legajo || !email) { errorDiv.textContent = "Complete ambos campos."; return; }

  formBuscador.style.display = 'none';
  loader.style.display = 'block';

  const parsed = await cargarDatos(); // Llamada simplificada
  const fila = parsed.data.find(row => row['Legajo']?.trim().toLowerCase() === legajo && row['Email']?.trim().toLowerCase() === email);

  setTimeout(() => {
    loader.style.display = 'none';
    if(!fila) {
      formBuscador.style.display = 'block';
      errorDiv.textContent = "Datos incorrectos. Verifique e intente nuevamente.";
      return;
    }

    const nombreEstudiante = fila[parsed.meta.fields[0]] || "Estudiante";
    const condicion = (fila['Condición'] || "EN CURSO / PENDIENTE").trim();
    let claseBadge = "badge-pendiente";

    const condUpper = condicion.toUpperCase();
    if (condUpper.includes("PROMOCION")) { claseBadge = "badge-promocion"; } 
    else if (condUpper.includes("REGULAR") && !condUpper.includes("NO")) { claseBadge = "badge-regular"; } 
    else if (condUpper.includes("NO REGULAR")) { claseBadge = "badge-irregular"; }

    let html = `<p style="font-size: 1.1em; margin-bottom: 20px;">
                  <strong>${nombreEstudiante}:</strong> 
                  <span class="badge-condicion ${claseBadge}">${condicion}</span>
                </p>`;
    
    html += generarBloque(fila, "T", "Teóricos", ["TECP", "Condición"], "A: Ausente | P: Presente");
    html += generarBloque(fila, "P", "Trabajos Prácticos", ["°", "F", "PARCIAL", "PFI", "Condición"], "A: Ausente | P: Presente");
    html += generarBloque(fila, "S", "Simulación", ["Condición"], "A: Ausente | P: Presente");
    html += generarBloque(fila, "AE", "Autoevaluaciones Asincrónicas Obligatorias", ["Condición"], "A: Ausente | P: Presente");
    html += generarBloqueEvaluacion(fila);

    html += `
      <div class="sello-contenedor">
        <div class="sello-verificado">
          <div class="sello-texto">Información Verificada</div>
        </div>
        <button class="btn-pdf" onclick='generarPDF(${JSON.stringify(fila)})'>
            <span>📄 Descargar Información (PDF)</span>
        </button>
      </div>
      <div class="seccion-referencias">
        <strong>Referencias:</strong> T: Teóricos | P: Prácticos | S: Simulación | AE: Autoevaluación | PFI: Parcial Final Integrador | TECP: Taller de Evaluación Continua para Promoción | °/F: Fechas Parcial.
      </div>
      <button id="btnVolver" onclick="location.reload()">Volver</button>
      <p class="info-institucional">Sujeto a las <a href="https://educativa.med.unlp.edu.ar/course/view.php?id=290" target="_blank" class="link-condiciones">condiciones</a> establecidas por la cátedra.</p>
    `;

    resDiv.innerHTML = html;
  }, 1200);
}

function generarPDF(fila) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const fechaDescarga = new Date().toLocaleString();
    const logoImg = document.getElementById('imgLogo');

    doc.setProperties({
        title: 'Información de Cursada - Toxicología',
        subject: 'Registros de cursada',
        author: 'Cátedra de Toxicología FCM UNLP'
    });

    function agregarMarcasDeAgua() {
        doc.saveGraphicsState();
        doc.setGState(new doc.GState({opacity: 0.08}));
        const imgW = 40;
        const imgH = 40;
        for(let y = 10; y < 280; y += 50) {
            for(let x = 10; x < 200; x += 50) {
                doc.addImage(logoImg, 'PNG', x, y, imgW, imgH, undefined, 'FAST');
            }
        }
        doc.restoreGraphicsState();
    }

    agregarMarcasDeAgua();

    doc.setDrawColor(56, 130, 143);
    doc.setLineWidth(1);
    doc.rect(5, 5, 200, 287); 

    const origW = logoImg.naturalWidth || 100;
    const origH = logoImg.naturalHeight || 100;
    const ratio = origH / origW;
    const finalW = 100;
    const finalH = finalW * ratio;

    try {
        doc.addImage(logoImg, 'PNG', (210 - finalW) / 2, 12, finalW, finalH);
    } catch(e) { console.log(e); }
    
    doc.setDrawColor(200);
    doc.line(20, 15 + finalH + 5, 190, 15 + finalH + 5);

    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.setTextColor(36, 109, 119);
    doc.text("INFORME DE SITUACIÓN ACADÉMICA", 105, 25 + finalH, { align: "center" });

    doc.setFontSize(11);
    doc.setTextColor(0);
    let yPos = 40 + finalH;
    doc.text(`Alumno/a: ${fila[Object.keys(fila)[0]]}`, 20, yPos);
    doc.text(`Legajo: ${fila['Legajo']}`, 20, yPos + 7);
    doc.text(`Condición Final: ${fila['Condición'] || 'Pendiente'}`, 20, yPos + 14);

    yPos += 25;
    const keys = Object.keys(fila);

    function agregarSeccion(titulo, prefijo, excluir = []) {
        const cols = keys.filter(k => k.toUpperCase().startsWith(prefijo.toUpperCase()) && !excluir.some(ex => k.toUpperCase().includes(ex.toUpperCase())) && fila[k]?.trim() !== "");
        if (cols.length > 0) {
            doc.setFont("helvetica", "bold");
            doc.setFillColor(235, 245, 246);
            doc.rect(20, yPos - 5, 170, 7, 'F');
            doc.text(titulo, 22, yPos);
            yPos += 8;
            doc.setFont("helvetica", "normal");
            let xPos = 22;
            cols.forEach(c => {
                if(xPos > 170) { xPos = 22; yPos += 6; }
                doc.setFontSize(9);
                doc.text(`${c}: ${fila[c]}`, xPos, yPos);
                xPos += 30;
            });
            yPos += 12;
        }
    }

    agregarSeccion("TEÓRICOS", "T", ["TECP", "Condición"]);
    agregarSeccion("TRABAJOS PRÁCTICOS", "P", ["°", "F", "PARCIAL", "PFI", "Condición"]);
    agregarSeccion("SIMULACIÓN", "S", ["Condición"]);
    agregarSeccion("AUTOEVALUACIONES", "AE", ["Condición"]);

    const evalCols = keys.filter(k => (k.includes("°") || k.includes("F") || k.includes("PARCIAL") || k.startsWith("PFI") || k.startsWith("TECP")) && !k.toUpperCase().includes("CONDICIÓN") && fila[k]?.trim() !== "");
    if (evalCols.length > 0) {
        doc.setFont("helvetica", "bold");
        doc.text("CALIFICACIONES DE EXÁMENES", 22, yPos);
        yPos += 8;
        doc.setFont("helvetica", "normal");
        evalCols.forEach(c => {
            if(yPos > 250) { doc.addPage(); yPos = 20; }
            doc.text(`• ${c}: ${fila[c]}`, 25, yPos);
            yPos += 6;
        });
    }

    const barcodeVal = `UNLP-TOX-${fila['Legajo'].replace('/','-')}`;
    JsBarcode("#barcode", barcodeVal, { format: "CODE128", displayValue: false });
    const canvas = document.getElementById("barcode");
    const barcodeImg = canvas.toDataURL("image/png");

    doc.addImage(barcodeImg, 'PNG', 140, 255, 50, 15);
    doc.setFontSize(8);
    doc.setTextColor(100);
    doc.text(`Validación: ${barcodeVal}`, 140, 275);
    doc.text(`Emitido: ${fechaDescarga}`, 20, 275);
    doc.setFont("helvetica", "italic");
    doc.text("Este informe es un documento digital ineditable generado por la Cátedra de Toxicología.", 20, 280);

    doc.save(`Informacion_de_cursada_TOX_${fila['Legajo'].replace('/','_')}.pdf`);
}

function aplicarLogicaColores(valor, esEvaluacion = false) {
    if (!valor) return "";
    const v = valor.trim().toUpperCase();
    if (v === "A" && !esEvaluacion) return "desaprobado"; 
    if (v === "P") return "promocion"; 
    if (v === "A" && esEvaluacion) return "promocion"; 
    if (v === "D") return "desaprobado"; 
    const num = parseFloat(v);
    if (!isNaN(num)) return (num >= 4) ? "promocion" : "desaprobado";
    return "";
}

function generarBloque(fila, prefijo, titulo, excluir = [], aclaracion = "") {
  const columnas = Object.keys(fila).filter(col => {
    const c = col.toUpperCase();
    return c.startsWith(prefijo.toUpperCase()) && !excluir.some(ex => c.includes(ex.toUpperCase())) && fila[col]?.trim() !== "";
  });
  if (columnas.length === 0) return "";
  let b = `<div class="categoria-bloque"><div class="categoria-titulo">${titulo}</div><div class="grid-datos">`;
  columnas.forEach(c => { 
    const clase = aplicarLogicaColores(fila[c], false);
    b += `<div class="dato-item ${clase}"><span class="dato-label">${c}</span><span class="dato-valor">${fila[c]}</span></div>`; 
  });
  b += `</div><div class="aclaracion-chiquita">${aclaracion}</div></div>`;
  return b;
}

function generarBloqueEvaluacion(fila) {
  const columnas = Object.keys(fila).filter(col => {
    const c = col.toUpperCase();
    return (c.includes("°") || c.includes("F") || c.includes("PARCIAL") || c.startsWith("PFI") || c.startsWith("TECP")) && !c.includes("CONDICIÓN") && fila[col]?.trim() !== "";
  });
  if (columnas.length === 0) return "";
  let b = `<div class="categoria-bloque"><div class="categoria-titulo">EVALUACIONES</div><div class="grid-datos">`;
  columnas.forEach(c => {
    const clase = aplicarLogicaColores(fila[c], true);
    b += `<div class="dato-item ${clase}"><span class="dato-label">${c}</span><span class="dato-valor">${fila[c]}</span></div>`;
  });
  b += `</div><div class="aclaracion-chiquita">(A: Aprobado | D: Desaprobado | Calificación numérica)</div></div>`;
  return b;
}

window.onload = verificarEstado;
</script>
</body>
</html>
